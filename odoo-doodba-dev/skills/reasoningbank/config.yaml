reasoningbank:
  # Odoo Design Patterns - Focus on anti-patterns and their fixes
  odoo:
    focus: "design_patterns"
    capture_failures: true  # Emphasize learning from what doesn't work
    generalization_level: "high"  # Prefer generalized patterns over specific solutions

    # Odoo-specific domains for pattern categorization
    domains:
      - "odoo.models"           # Model design, inheritance, mixins
      - "odoo.views"            # XML views, QWeb templates
      - "odoo.controllers"      # HTTP controllers, routing
      - "odoo.orm"              # ORM operations, search domains, recordsets
      - "odoo.security"         # Access rights, record rules, groups
      - "odoo.api"              # API decorators, onchange, constraints
      - "odoo.workflow"         # State machines, automated actions
      - "odoo.reports"          # Report generation, QWeb reports
      - "odoo.tests"            # Testing patterns, test isolation
      - "odoo.deployment"       # Doodba, docker, CI/CD
      - "odoo.performance"      # Query optimization, caching
      - "odoo.architecture"     # Module structure, dependencies

    # Common anti-pattern categories to track
    anti_patterns:
      - "orm_misuse"            # Inefficient ORM usage
      - "security_holes"        # Security vulnerabilities
      - "circular_deps"         # Circular dependencies
      - "data_coupling"         # Tight data coupling
      - "testing_issues"        # Test isolation, mocking problems
      - "migration_issues"      # Upgrade/migration failures
      - "xml_errors"            # View/data XML issues
      - "performance_traps"     # N+1 queries, inefficient searches

  retrieve:
    k: 5  # Retrieve more patterns for Odoo complexity
    alpha: 0.65
    beta: 0.15
    gamma: 0.20
    delta: 0.10
    recency_half_life_days: 90  # Longer half-life for stable Odoo patterns
    duplicate_threshold: 0.87
    embedding_model: "voyage-3"

    # Prefer failure patterns (anti-patterns and fixes)
    failure_boost: 1.2  # Boost relevance score for failure-derived patterns

  judge:
    model: "claude-sonnet-4-5-20250929"
    temperature: 0
    max_tokens: 1024

    # Odoo-specific evaluation criteria
    odoo_criteria:
      - "follows_odoo_guidelines"
      - "proper_orm_usage"
      - "security_best_practices"
      - "test_coverage"
      - "doodba_compatibility"

  distill:
    max_items_per_traj: 5  # More patterns from complex Odoo tasks
    redact_pii: true
    model: "claude-sonnet-4-5-20250929"
    temperature: 0.3
    max_tokens: 2048

    # Emphasize generalization for Odoo patterns
    generalization_prompt: |
      Extract GENERALIZED patterns, not specific solutions.
      Focus on:
      1. What DOESN'T work and WHY
      2. How it was FIXED
      3. The underlying PRINCIPLE
      4. How to RECOGNIZE similar issues
      DO NOT capture specific variable names, module names, or instance-specific details.

  consolidate:
    run_every_new_items: 15  # More frequent consolidation
    contradiction_threshold: 0.60
    prune_age_days: 365  # Keep Odoo patterns longer (stable framework)
    min_confidence_keep: 0.35
    dedup_threshold: 0.87

  matts:
    enabled: true
    parallel_k: 6
    sequential_r: 3

  database:
    path: "~/.reasoningbank/odoo_patterns.db"  # Separate DB for Odoo patterns

  learning:
    initial_confidence_success: 0.70  # Slightly lower - need validation
    initial_confidence_failure: 0.75  # Higher - failures are valuable!
    learning_rate: 0.05
    success_delta: 1.0
    failure_delta: -0.3  # Less penalty - failures teach us

  # Centralized Reasoning Bank - Share patterns with community
  central:
    enabled: false  # Set to true to enable central sync
    api_url: "https://reasoningbank.example.com/api/v1"
    api_key: "${REASONINGBANK_API_KEY}"  # Set via environment variable
    user_id: "${USER}"  # Anonymous by default
    org_id: null  # Optional organization ID

    # User consent management
    consent:
      mode: "ask_each_time"  # ask_each_time | always_allow | always_deny | domain_specific
      share_domains:  # For domain_specific mode
        - "odoo.orm"
        - "odoo.performance"
        - "odoo.views"
      block_domains:  # Never auto-share these domains
        - "odoo.security"  # Security patterns should be reviewed
      auto_approve_high_confidence: true
      min_confidence_auto: 0.90  # Auto-approve patterns >= 0.90 confidence
      show_preview: true  # Show pattern preview before asking consent
      anonymize_paths: true
      anonymize_org: true
      remember_choice: true  # Allow "Remember this choice" option

    # Synchronization settings
    sync:
      upload_enabled: true
      download_enabled: true
      mode: "hybrid"  # hybrid | upload_only | download_only
      batch_size: 10  # Patterns per batch upload
      retry_max: 5
      retry_backoff_base: 2  # Exponential backoff (seconds)
      sync_interval: 21600  # 6 hours in seconds
      offline_queue_max: 1000  # Max queued patterns

    # Community pattern retrieval
    retrieval:
      include_community: true
      community_weight: 0.7  # vs. 1.0 for local patterns
      min_community_confidence: 0.65
      min_community_upvotes: 3
      cache_community_patterns: true
      cache_ttl: 86400  # 24 hours in seconds

    # Privacy controls
    privacy:
      redact_file_paths: true
      redact_usernames: true
      redact_ips: true
      redact_custom_patterns:  # Custom regex patterns to redact
        - '\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b'  # Emails
      hash_task_ids: true  # Hash task IDs before upload

    # Feedback settings
    feedback:
      auto_report_failures: false  # Report if pattern didn't help
      auto_upvote_successes: false  # Upvote if pattern helped
